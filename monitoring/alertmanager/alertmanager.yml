global:
  resolve_timeout: 5m

route:
  receiver: default-notifications
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  # This default receiver keeps alerts visible in Alertmanager and Grafana.
  # Replace it with Slack, email, PagerDuty, or webhook integrations for real deployments.
  - name: default-notifications

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "instance"]
