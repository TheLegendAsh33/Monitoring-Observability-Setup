# Global defaults keep scraping responsive enough for demos without overwhelming the sample stack.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: monitoring-observability-demo
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: app
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - app:3000
        labels:
          service: checkout-service
          environment: production

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          layer: infrastructure

  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          layer: containers

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://app:3000/health/live
          - http://app:3000/health/ready
        labels:
          service: checkout-service
          layer: availability
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [__param_target]
        target_label: probe_target
      - target_label: __address__
        replacement: blackbox-exporter:9115
