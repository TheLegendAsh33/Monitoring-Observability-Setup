services:
  app:
    build:
      context: ./app
    image: checkout-service:local
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      APP_PORT: 3000
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${APP_NAME:-checkout-service}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      SESSION_TTL_MS: ${SESSION_TTL_MS:-900000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ERROR_RATE_PERCENT: ${ERROR_RATE_PERCENT:-8}
      LOG_DIR: /var/log/checkout-service
      LOG_FILE: application.log
    volumes:
      - app_logs:/var/log/checkout-service
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 512m
    cpus: 1.00
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./monitoring/prometheus/blackbox.yml:/etc/prometheus/blackbox.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
      - alertmanager
      - node-exporter
      - cadvisor
      - blackbox-exporter
    networks:
      - observability

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_USERS_DEFAULT_THEME: light
      GF_FEATURE_TOGGLES_ENABLE: alertingSimplifiedRouting
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - alertmanager
    networks:
      - observability

  loki:
    image: grafana/loki:3.1.1
    restart: unless-stopped
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - observability

  promtail:
    image: grafana/promtail:3.1.1
    restart: unless-stopped
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - app_logs:/var/log/checkout-service:ro
    depends_on:
      - loki
      - app
    networks:
      - observability

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro
    ports:
      - "9100:9100"
    networks:
      - observability

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - observability

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - observability

volumes:
  alertmanager_data:
  app_logs:
  grafana_data:
  loki_data:
  prometheus_data:

networks:
  observability:
    driver: bridge
